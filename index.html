<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>22's 520 Gift
    </title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            padding: 0;
            height: 100%;
        }

        .container {
            background-color: #804bcf;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .header {
            background-color: #804bcf;
            padding: 4px;
            margin: 0;
            height: 80px;
            width: 100%;
            align-items: center;
            display: flex;
        }

        .flex-container {
            display: flex;
            align-items: center;
            padding-top: 20px;
        }

        .flex-container-text {
            display: flex;
            align-items: center;
            margin: 0;
        }

        .avatar {
            width: 70px;
            height: auto;
            margin-right: 12px;
            margin-left: 8px;
        }

        .celeImage {
            width: 500px;
            height: auto;
        }

        .title-container {
            display: flex;
            flex-direction: column;
        }

        .text-container {
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .title-container h1 {
            color: white;
            font-size: 22px;
            margin-top: 2px;
            margin-bottom: 2px;
        }

        .title-container p {
            color: black;
            font-size: 18px;
            font-weight: bold;
            margin-top: 2px;
            margin-bottom: 2px;
        }

        .text-container h2 {
            color: white;
            font-size: 66px;
            margin: 4px;
            line-height: 1.3;
        }

        .text-container p {
            color: #f1d726;
            font-size: 28px;
            /* font-weight: bold; */
            margin: 4px;
            line-height: 1.3;
        }
    </style>
</head>

<body>
    <!-- top栏 -->
    <header class="header">
        <div class="flex-container">
            <img src="images/22_avatar.jpg" alt="22's avatar" class="avatar">
            <div class="title-container">
                <h1>22's 520 Gift</h1>
                <p>100% HANDMADE</p>
            </div>
        </div>
    </header>
    <!-- 内容栏 -->
    <div class="container">
        <div class="flex-container-text">
            <div class="text-container">
                <h2>TODAY'S 520 - 22 LOVES LL, WOHOO!</h2>
                <p>The most beautiful things in the world cannot be seen or touched, they are felt with the heart.</p>
            </div>
            <img src="images/22_cele.jpg" alt="Celebrate image" class="celeImage">
        </div>
    </div>
</body>

</html>
